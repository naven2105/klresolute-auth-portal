<!--
File: templates/dashboard.html

Purpose:
- Display dashboard
- Sync session timer with backend (5 minutes)
-->

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

    <h2>Dashboard</h2>

    <p><a href="/logout">Logout</a></p>

    <hr>

    <h3>Identity</h3>
    <p><strong>Client:</strong> {{ client_name }}</p>
    <p><strong>Email:</strong> {{ email }}</p>

    <hr>

    <h3>Modules (Coming Soon)</h3>
    <ul>
        <li>Daily Specials</li>
        <li>Messages</li>
        <li>Settings</li>
    </ul>

    <hr>

    <p id="session-warning" style="color: red; display: none;">
        Your session will expire soon due to inactivity.
    </p>

    <script>
        const lastActivity = new Date("{{ last_activity_at }}").getTime();
        const now = new Date().getTime();

        // ✅ MATCH BACKEND (5 minutes)
        const timeoutMs = 5 * 60 * 1000;
        const warningMs = 60 * 1000; // show warning in last 1 minute

        let remaining = timeoutMs - (now - lastActivity);

        const interval = setInterval(() => {
            remaining -= 1000;

            if (remaining <= warningMs) {
                document.getElementById("session-warning").style.display = "block";
            }

            if (remaining <= 0) {
                clearInterval(interval);
                window.location.href = "/login/test?expired=1";
            }

        }, 1000);
    </script>

</body>
</html>
