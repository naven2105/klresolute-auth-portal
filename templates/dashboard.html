<!--
File: templates/dashboard.html

Purpose:
- Display basic client dashboard
- Confirm authenticated user identity
- Show inactivity countdown warning
-->

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

    <h2>Dashboard</h2>

    <hr>

    <h3>Identity</h3>
    <p><strong>Client:</strong> {{ client_name }}</p>
    <p><strong>Email:</strong> {{ email }}</p>

    <hr>

    <h3>Modules (Coming Soon)</h3>
    <ul>
        <li>Daily Specials</li>
        <li>Messages</li>
        <li>Settings</li>
    </ul>

    <hr>

    <!-- Session Warning -->
    <p id="session-warning" style="color: red; display: none;">
        Your session will expire soon due to inactivity.
    </p>

    <script>
        // 60 seconds total
        const totalTime = 60;
        const warningTime = 30;

        let elapsed = 0;

        setInterval(() => {
            elapsed++;

            if (elapsed === warningTime) {
                document.getElementById("session-warning").style.display = "block";
            }

            if (elapsed >= totalTime) {
                window.location.href = "/login/test?expired=1";
            }

        }, 1000);
    </script>

</body>
</html>
