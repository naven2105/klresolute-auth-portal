<!--
File: templates/dashboard.html

Purpose:
- Display dashboard
- Show identity
- Show session expiry warning (no forced logout)
-->

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

    <h2>Dashboard</h2>

    <!-- Logout -->
    <p><a href="/logout">Logout</a></p>

    <hr>

    <h3>Identity</h3>
    <p><strong>Client:</strong> {{ client_name }}</p>
    <p><strong>Email:</strong> {{ email }}</p>

    <hr>

    <h3>Modules (Coming Soon)</h3>
    <ul>
        <li>Daily Specials</li>
        <li>Messages</li>
        <li>Settings</li>
    </ul>

    <hr>

    <!-- Session Warning -->
    <p id="session-warning" style="color: red; display: none;">
        Your session will expire soon due to inactivity.
    </p>

    <script>
        const lastActivity = new Date("{{ last_activity_at.isoformat() }}").getTime();
        const now = new Date().getTime();

        const timeoutMs = 5 * 60 * 1000;
        const warningMs = 60 * 1000;

        let remaining = timeoutMs - (now - lastActivity);

        const interval = setInterval(() => {
            remaining -= 1000;

            if (remaining <= warningMs) {
                document.getElementById("session-warning").style.display = "block";
            }

        }, 1000);
    </script>

</body>
</html>
