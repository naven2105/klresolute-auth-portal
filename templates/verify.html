<!DOCTYPE html>
<html>
<head>
    <title>Verify Code</title>
</head>
<body>

    <h2>Enter Your Code</h2>

    <!-- Error message -->
    {% if error %}
        <p style="color:red;"><strong>{{ error }}</strong></p>
    {% endif %}

    <!-- Countdown redirect (only when locked) -->
    {% if redirect_to_login %}
        <p>Redirecting in <span id="countdown">5</span> seconds...</p>

        <script>
            let seconds = 5;
            const countdown = document.getElementById("countdown");

            const timer = setInterval(() => {
                seconds--;
                countdown.textContent = seconds;

                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = "/login/{{ client_number }}";
                }
            }, 1000);
        </script>
    {% endif %}

    <p>We sent a 6-digit code to your email and WhatsApp</p>

    <form method="POST" action="/auth/verify-otp">
        
        <input type="hidden" name="contact" value="{{ contact }}">
        <input type="hidden" name="client_number" value="{{ client_number }}">

        <label>Enter Code:</label><br>
        <input type="text" name="code" maxlength="6" required><br><br>

        <button type="submit">Verify Code</button>
    </form>

    <br><br>
    <hr>

    <p>Didn’t receive it?</p>

    <form method="POST" action="/auth/request-otp">
        <input type="hidden" name="contact" value="{{ contact }}">
        <input type="hidden" name="client_number" value="{{ client_number }}">

        <button id="resendBtn" type="submit" disabled
            style="background:none;border:none;color:grey;text-decoration:underline;cursor:not-allowed;">
            Resend code (30s)
        </button>
    </form>

    <script>
        let seconds = 30;
        const btn = document.getElementById("resendBtn");

        const timer = setInterval(() => {
            seconds--;
            btn.textContent = `Resend code (${seconds}s)`;

            if (seconds <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = "Resend code";
                btn.style.color = "blue";
                btn.style.cursor = "pointer";
            }
        }, 1000);
    </script>

</body>
</html>
