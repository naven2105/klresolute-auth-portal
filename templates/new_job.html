File: new_job.html

Purpose:
- Capture new Dumela service job
-->

<!DOCTYPE html>
<html>
<head>
    <title>New Service Job</title>
</head>
<body>

    <h2>Create Service Job</h2>

    <form method="POST" action="/jobs">

        <label>Customer Company Name:</label><br>
        <input type="text" name="customer_company_name" required><br><br>

        <label>Service Address:</label><br>
        <input type="text" name="service_address"><br><br>

        <label>Contact Person Name:</label><br>
        <input type="text" name="contact_person_name"><br><br>

        <label>Contact Phone:</label><br>
        <input type="text" name="contact_phone"><br><br>

        <label>Contact Email:</label><br>
        <input type="email" name="contact_email"><br><br>

        <label>Scheduled Service Date:</label><br>
        <input type="datetime-local" name="scheduled_service_date" required><br><br>

        <label>Account Manager Name:</label><br>
        <input type="text" name="account_manager_name"><br><br>

        <label>Assigned Technician Name:</label><br>
        <input type="text" name="assigned_technician_name"><br><br>

        <button type="submit">Save Job</button>

    </form>

    <br>
    <a href="/jobs">View Jobs</a>

</body>
</html>
