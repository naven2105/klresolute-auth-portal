<!DOCTYPE html>
<html>
<head>
    <title>Client Login</title>
</head>
<body>

    <h2>Client Login</h2>

    <p>Enter your email to receive a login code</p>

    <form method="POST" action="/auth/request-otp">
        <label>Email:</label><br>
        <input type="email" name="contact" required><br><br>

        <input type="hidden" name="client_number" value="{{ client_number }}">

        <button type="submit">Send Code</button>
    </form>

</body>
</html>
