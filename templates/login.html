<!--
File: templates/login.html

Purpose:
- Login page
- Accept user contact (email/phone)
- Show session expiry message if applicable
-->

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login</h2>

    {% if expired %}
        <p style="color: red;">
            Your session expired due to inactivity. Please log in again.
        </p>
    {% endif %}

    <form method="POST" action="/auth/request-otp">
        <input type="hidden" name="client_number" value="{{ client_number }}">

        <label>Enter Email or Phone:</label><br>
        <input type="text" name="contact" required><br><br>

        <button type="submit">Request Code</button>
    </form>

</body>
</html>
